<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Girassol&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="script.js"></script>
</head>

<body>
    <div id="app" class="container">
        <header class="header">
            <div class="logo-group">
                <h1>Svenssons Hantverk AB</h1>
                <img src="resources/hammericon.png" alt="Hammare" class="header-icon">
            </div>

            <div class="user-group">
                <img src="resources/profilepic.png" alt="Profilbild" class="user-icon">
                <span class="user-name">Chef</span>
                <img src="resources/settingsicon.png" alt="Inställningar" class="settings-icon">
            </div>
        </header>

        <div class="panel">
            <div class="rubrik">
                <h2>Bemanning</h2>
                <p>Översikt över alla hantverkare kommande 4 veckor.</p>
            </div>
            <div class="drop-downs">
                <div class="filter-card">
                    <input type="text" class="search" placeholder="🔍 Sök hantverkare...">
                </div>
                <div class="filter-card">
                    <select class="dropdown">
                        <option>Yrke: Alla</option>
                        <option>Säljare</option>
                        <option>Ekonom</option>
                        <option>Målare</option>
                        <option>Snickare/Målare</option>
                        <option>Snickare</option>
                        <option>Snickare/Elektriker</option>
                        <option>Elektriker</option>
                        <option>Rörmokare</option>
                        <option>Rörmokare/Murare</option>
                        <option>Murare</option>
                    </select>
                </div>
                <div class="filter-card">
                    <select class="dropdown">
                        <option>Status: Alla</option>
                        <option>Tillgänglig</option>
                        <option>Bokad 100%</option>
                        <option>Bokad 50%</option>
                        <option>Frånvaro</option>
                    </select>
                </div>
                <div class="filter-card">
                    <select class="dropdown">
                        <option>Vecka: Alla</option>
                        <option>v20-23</option>
                        <option>v24-27</option>
                        <option>v28-31</option>
                        <option>v32-35</option>
                    </select>
                </div>
                <section class=""></section>
            </div>

            <div class="stats-container">
                <div class="stat-item">
                    <p>Lediga</p>
                    <div class="stat-card">
                        <strong>8 personer</strong>
                    </div>
                </div>

                <div class="stat-item">
                    <p>Delvis bokade</p>
                    <div class="stat-card">
                        <strong>6 personer</strong>
                    </div>
                </div>

                <div class="stat-item">
                    <p>Fullt bokade</p>
                    <div class="stat-card">
                        <strong>10 personer</strong>
                    </div>
                </div>

                <div class="stat-item">
                    <p>Frånvarande</p>
                    <div class="stat-card">
                        <strong>4 personer</strong>
                    </div>
                </div>
            </div>
        </div>



        <!--TECKENFÖRKLARING-->
        <div class="legend">
            <span>Teckenförklaring:</span>
            <div class="legend-item">
                <div class="box available"></div>
                <span>Tillgänglig</span>
            </div>

            <div class="legend-item">
                <div class="box half"></div>
                <span>Bokad 50%</span>
            </div>
            <!-- 
                 <div class="legend-item">
                    <div class="box double">  
                    <span>Bokad 2X50%</span>
                    </div>
                </div> -->

            <div class="legend-item">
                <div class="box absence">X</div>
                <span>Frånvaro</span>
            </div>
        </div>

        <div class="calendar-view">
            <div class="week-headers">
                <div class="header-spacer"></div>
                <div class="week-labels">
                    <span>Vecka 20</span>
                    <span>Vecka 21</span>
                    <span>Vecka 22</span>
                    <span>Vecka 23</span>
                </div>
            </div>

            <div class="profession-card">
                <worker-row v-for="w in officeStaff" :key="w.name" :worker="w" />
            </div>

            <div class="profession-card">
                <worker-row v-for="w in painters" :key="w.name" :worker="w" />
            </div>

            <div class="profession-card">
                <worker-row v-for="w in handyPaint" :key="w.name" :worker="w" />
            </div>

            <div class="profession-card">
                <worker-row v-for="w in handyMen" :key="w.name" :worker="w" />
            </div>

            <div class="profession-card">
                <worker-row v-for="w in handyElec" :key="w.name" :worker="w" />
            </div>

            <div class="profession-card">
                <worker-row v-for="w in electritian" :key="w.name" :worker="w" />
            </div>

            <div class="profession-card">
                <worker-row v-for="w in sewer" :key="w.name" :worker="w" />
            </div>

            <div class="profession-card">
                <worker-row v-for="w in sewerTrump" :key="w.name" :worker="w" />
            </div>

            <div class="profession-card">
                <worker-row v-for="w in trump" :key="w.name" :worker="w" />
            </div>

        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
