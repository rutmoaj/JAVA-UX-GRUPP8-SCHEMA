<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Girassol&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script type="module" src="script.js"></script>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo-group">
                <h1>Svenssons Hantverk AB</h1>
                <img src="resources/hammericon.png" alt="Hammare" class="header-icon">
            </div>

            <div class="user-group">
                <img src="resources/profilepic.png" alt="Profilbild" class="user-icon">
                <span class="user-name">Chef</span>
                <img src="resources/settingsicon.png" alt="Inställningar" class="settings-icon">
            </div>
        </header>

        <div class="panel">
            <div class="rubrik">
                <h2>Bemanning</h2>
                <p>Översikt över alla hantverkare kommande 4 veckor.</p>
            </div>
            <div class="drop-downs">
                <div class="search-wrapper">
                    <input type="text" class="search" placeholder="🔍 Sök hantverkare...">
                </div>
                <div class="profession">
                    <select class="dropdown" v-model="selectedProfession">
                        <option>Profession:</option>
                        <option>All</option>
                        <option>Salesperson</option>
                        <option>Economist</option>
                        <option>Painter</option>
                        <option>Carpenter/Painter</option>
                        <option>Carpenter</option>
                        <option>Carpenter/Electrician</option>
                        <option>Electrician</option>
                        <option>Plumber</option>
                        <option>Plumber/Mason</option>
                        <option>Mason</option>
                    </select>
                </div>
                <div class="status">
                    <select class="dropdown">
                        <option>Status: </option>
                        <option>All</option>
                        <option>Available</option>
                        <option>Booked 100%</option>
                        <option>Booked 50%</option>
                        <option>Absence</option>
                    </select>
                </div>
                <div class="week">
                    <select class="dropdown">
                        <option>Week: </option>
                        <option>All</option>
                        <option>v20-23</option>
                        <option>v24-27</option>
                        <option>v28-31</option>
                        <option>v32-35</option>
                    </select>
                </div>
                <section class=""></section>
            </div>
        </div>

        <div id="app" class="container">
            <div class="stats-container">
                <div v-for="stat in stats" :key="stat.label" class="stat-card">
                    <span class="label">{{ stat.label }}</span>
                    <strong>{{ stat.value }}</strong>
                </div>
            </div>

            <div class="calendar-view">
                <div class="week-headers">
                    <div class="header-spacer"></div>
                    <div class="week-labels">
                        <span>Vecka 20</span>
                        <span>Vecka 21</span>
                        <span>Vecka 22</span>
                        <span>Vecka 23</span>
                    </div>
                </div>

                <div v-for="worker in workers" :key="worker.name" class="worker-row">
                    <div class="worker-identity">
                        <span class="name">{{ worker.name }}</span>
                        <span class="title">{{ worker.role }}</span>
                    </div>

                    <div class="schedule-grid">
                        <div v-for="(week, index) in worker.schedule" :key="index" class="week-group">
                            <div v-for="(status, sIndex) in week" :key="sIndex" :class="['box', status]">
                                <span v-if="status === 'absence'">X</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script type="module" src="script.js"></script>
</body>

</html>
